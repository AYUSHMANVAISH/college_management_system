{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
  <div class="card shadow-lg border-0 rounded-4 mx-auto" style="max-width: 600px;">
    <div class="card-header text-white text-center py-3"
         style="background: linear-gradient(90deg, #0d6efd, #6610f2);">
      <h3 class="mb-0 fw-bold">📝 Enroll Student in Course</h3>
    </div>

    <div class="card-body bg-light p-4">
      <form method="POST">

        <div class="mb-3">
          <label class="form-label fw-semibold">Select Student</label>
          <select class="form-select shadow-sm" name="student_id" required>
            <option value="" disabled selected>Choose a student...</option>
            {% for student in students %}
            <option value="{{ student.student_id }}">{{ student.name }} ({{ student.dept_name }})</option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Select Course</label>
          <select class="form-select shadow-sm" name="course_id" required>
            <option value="" disabled selected>Choose a course...</option>
            {% for course in courses %}
            <option value="{{ course.course_id }}">{{ course.course_name }}</option>
            {% endfor %}
