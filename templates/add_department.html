{% extends "base.html" %}
{% block content %}

<div class="container my-5">
  <div class="card shadow-lg border-0 rounded-3">
    <div class="card-header bg-primary text-white text-center fs-4 fw-semibold">
      🏛️ Add New Department
    </div>

    <div class="card-body p-4">
      <form method="POST" action="{{ url_for('add_department') }}">
        <div class="mb-3">
          <label for="dept_name" class="form-label fw-semibold">Department Name</label>
          <input type="text" name="dept_name" id="dept_name" class="form-control"
                 placeholder="e.g. Computer Science" required>
        </div>

        <div class="mb-3">
          <label for="hod" class="form-label fw-semibold">Head of Department (HOD)</label>
          <input type="text" name="hod" id="hod" class="form-control"
                 placeholder="e.g. Dr. Mehta">
        </div>

        <div class="mb-3">
          <label for="location" class="form-label fw-semibold">Department Location</label>
          <input type="text" name="location" id="location" class="form-control"
                 placeholder="e.g. Block A">
        </div>

        <div class="d-flex justify-content-between mt-4">
          <a href="{{ url_for('view_departments') }}" class="btn btn-outline-secondary">
            ← Back to Departments
          </a>
          <button type="submit" class="btn btn-success">
            <i class="fa fa-plus-circle me-1"></i> Add Department
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
