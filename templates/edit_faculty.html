{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
  <div class="card shadow p-4">
    <h3 class="text-primary mb-3"><i class="fa fa-edit me-2"></i>Edit Faculty</h3>

    <form method="POST">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Name</label>
          <input type="text" name="name" value="{{ faculty.name }}" class="form-control" required>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Designation</label>
          <input type="text" name="designation" value="{{ faculty.designation }}" class="form-control" required>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" value="{{ faculty.email }}" class="form-control" required>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Department</label>
          <select name="dept_id" class="form-select" required>
            {% for d in departments %}
            <option value="{{ d.dept_id }}" {% if d.dept_id == faculty.dept_id %}selected{% endif %}>
              {{ d.dept_name }}
            </option>
            {% endfor %}
          </select>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Salary</label>
          <input type="number" step="0.01" name="salary" value="{{ faculty.salary }}" class="form-control" required>
        </div>
      </div>

      <div class="text-end">
        <a href="{{ url_for('view_faculty') }}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary"><i class="fa fa-save"></i> Update</button>
      </div>
    </form>
  </div>
</div>

{% endblock %}
