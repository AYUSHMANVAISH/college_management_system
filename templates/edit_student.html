{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
  <div class="card shadow p-4">
    <h3 class="text-primary mb-3"><i class="fa fa-edit me-2"></i>Edit Student</h3>

    <form method="POST">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" value="{{ student.name }}" class="form-control" required>
        </div>

        <div class="col-md-3 mb-3">
          <label class="form-label">Age</label>
          <input type="number" name="age" value="{{ student.age }}" class="form-control" required>
        </div>

        <div class="col-md-3 mb-3">
          <label class="form-label">Gender</label>
          <select name="gender" class="form-select">
            <option value="Male" {% if student.gender == 'Male' %}selected{% endif %}>Male</option>
            <option value="Female" {% if student.gender == 'Female' %}selected{% endif %}>Female</option>
            <option value="Other" {% if student.gender == 'Other' %}selected{% endif %}>Other</option>
          </select>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Department</label>
          <select name="dept_id" class="form-select" required>
            {% for dept in departments %}
            <option value="{{ dept.dept_id }}" {% if dept.dept_id == student.dept_id %}selected{% endif %}>
              {{ dept.dept_name }}
            </option>
            {% endfor %}
          </select>
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" value="{{ student.email }}" class="form-control" required>
        </div>
      </div>

      <div class="text-end">
        <a href="{{ url_for('view_students') }}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-success"><i class="fa fa-save"></i> Update</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
